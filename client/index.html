<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Collaborative Canvas — Real-Time Drawing</title>
  <meta name="description" content="A real-time collaborative drawing canvas built with HTML5 Canvas, Node.js, and Socket.io. Draw together with multiple users simultaneously.">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  
  <div id="app">
    
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>Collaborative Canvas</h1>
      </div>
      
      <!-- Room Controls -->
      <div class="room-section">
        <h3>Room</h3>
        <input type="text" id="room-input" value="room-0" placeholder="Enter room name…">
        <div class="room-btn-row">
          <button class="btn-join" id="join-btn">Join Room</button>
          <button class="btn-create" id="create-btn">+ Create</button>
        </div>
      </div>

      <!-- Active Rooms List -->
      <div class="active-rooms-section">
        <h3>Active Rooms</h3>
        <ul id="active-rooms-list">
          <!-- Dynamically populated -->
        </ul>
      </div>

      <!-- Online Users -->
      <div class="users-section">
        <h3>Online · <span id="user-count">0</span></h3>
        <ul id="user-list">
          <!-- Dynamically populated -->
        </ul>
      </div>
    </aside>

    <!-- Canvas Area -->
    <main class="canvas-container">
      
      <!-- Floating Toolbar -->
      <div class="toolbar glass-panel">
        <div class="tools-group">
          <button class="tool-btn active" id="tool-brush" title="Brush (B)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9.06 11.9 8.07-8.06a2.85 2.85 0 1 1 4.03 4.03l-8.06 8.08"></path><path d="M7.07 14.94c-1.66 0-3 1.35-3 3.02 0 1.33-2.5 1.52-2 2.02 1.08 1.1 2.49 2.02 4 2.02 2.2 0 4-1.8 4-4.04a3.01 3.01 0 0 0-3-3.02z"></path></svg>
          </button>
          <button class="tool-btn" id="tool-eraser" title="Eraser (E)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"></path><path d="M22 21H7"></path><path d="m5 11 9 9"></path></svg>
          </button>
        </div>

        <div class="divider"></div>

        <div class="color-picker-wrapper">
          <input type="color" id="color-picker" value="#818cf8">
        </div>

        <div class="divider"></div>

        <div class="stroke-width-group">
          <label for="stroke-width">Size</label>
          <input type="range" id="stroke-width" min="1" max="50" value="5">
        </div>

        <div class="divider"></div>

        <div class="actions-group">
          <button class="action-btn" id="action-undo" title="Undo (Ctrl+Z)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"></path><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path></svg>
          </button>
          <button class="action-btn" id="action-clear" title="Clear Canvas">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
          </button>
        </div>
      </div>

      <!-- Canvas -->
      <canvas id="drawing-canvas"></canvas>
      
      <!-- Remote Cursors Overlay -->
      <div id="cursors-container"></div>
      
    </main>
  </div>

  <!-- Scripts -->
  <script type="module" src="ui.js"></script>
  <script type="module" src="canvas.js"></script>
  <script type="module" src="websocket.js"></script>
  <script type="module" src="main.js"></script>
</body>
</html>
